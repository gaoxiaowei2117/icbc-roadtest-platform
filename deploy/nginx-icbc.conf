# ICBC 平台 - nginx 配置
# 监听 9443（避开大陆备案要求）
# 反代 /api/ 到本机 8000，/booking/ 走静态文件

server {
    listen 9443 ssl;
    listen [::]:9443 ssl;
    http2 on;

    server_name gogoxoxo.duckdns.org;

    # ===== SSL（certbot 签的）=====
    ssl_certificate     /etc/letsencrypt/live/gogoxoxo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gogoxoxo.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ===== 客户端体量（前端 SPA + 抢约截图可能偏大）=====
    client_max_body_size 20m;

    # ===== API 反代 =====
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ===== 前端 SPA =====
    location /booking/ {
        alias /var/www/icbc-platform/;
        try_files $uri $uri/ /booking/index.html;
    }

    # ===== 健康检查（用 80 端口也行，但 9443 也开）=====
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
